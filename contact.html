        <h1>Contact Me</h1>
        <p>Feel free to reach out! Fill out the form below or find me on LinkedIn and GitHub.</p>
        <br>

        <p><strong>Email:</strong> saanderson050@gmail.com</p>
        <p><strong>LinkedIn:</strong><a href="https://www.linkedin.com/in/sylvia-anderson-37778137b/">linkedin.com</a></p>
        <p><strong>GitHub:</strong> <a href="https://github.com/SylAnna">github.com/sylAnna</a></p>
        <br>

        <form class="contact-form" id="contactForm">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your name" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" required>

            <label for="message">Message</label>
            <textarea id="message" rows="5" placeholder="What would you like to say?" required></textarea>

            <button type="submit" class="btn">Send Message</button>
            <p class="success-msg" id="successMsg">Message sent! I will get back to you soon.</p>
        </form>

    </div>
